# =============================================================
#  Sveltia CMS configuration
#  Defines what the visual admin (/admin) can edit and which form
#  fields each section exposes. The CMS only writes fields it knows
#  about, so each file's fields must match the underlying file
#  exactly, or unlisted data would be stripped on save.
# =============================================================

backend:
  name: github
  repo: Yangfan9606/lab-website   # ★set to "username/repo"; update again after transfer to the lab account
  branch: main                    # edits save to main; GitHub Actions builds and publishes to gh-pages
  # base_url: https://YOUR-AUTH-WORKER.workers.dev   # ★OAuth relay (see CMS-Guide.md section 3)

media_folder: images        # uploaded images are stored in the repo's images/ folder
public_folder: images       # path prefix written into files (= the template's existing style)

locale: en

collections:

  # ====================================================================
  #  PAGES - one "Pages" section in the sidebar; the 6 pages appear as a
  #  list on the right. Each edits its own data file under _data/content/.
  #  The page templates read these via Liquid, so layout stays locked.
  # ====================================================================
  - name: pages
    label: Pages
    label_singular: Page
    files:

      - name: home
        label: 'Main page'
        file: _data/content/home.yaml
        fields:
          - { name: banner, label: 'Home banner image (optional; blank = use site-wide Top banner)', widget: image, required: false }
          - { name: title, label: Big title, widget: string }
          - { name: intro, label: Intro paragraph, widget: text }
          - { name: feature1_title,  label: 'Panel 1 - title',  widget: string }
          - { name: feature1_text,   label: 'Panel 1 - text',   widget: text }
          - { name: feature1_button, label: 'Panel 1 - button label', widget: string }
          - { name: feature1_image,  label: 'Panel 1 - image',  widget: image }
          - { name: feature2_title,  label: 'Panel 2 - title',  widget: string }
          - { name: feature2_text,   label: 'Panel 2 - text',   widget: text }
          - { name: feature2_button, label: 'Panel 2 - button label', widget: string }
          - { name: feature2_image,  label: 'Panel 2 - image',  widget: image }
          - { name: feature3_title,  label: 'Panel 3 - title',  widget: string }
          - { name: feature3_text,   label: 'Panel 3 - text',   widget: text }
          - { name: feature3_button, label: 'Panel 3 - button label', widget: string }
          - { name: feature3_image,  label: 'Panel 3 - image',  widget: image }

      - name: research
        label: 'Research page'
        file: _data/content/research.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }
          - { name: highlighted_heading, label: 'Heading above featured papers', widget: string }
          - name: highlighted
            label: 'Featured papers (title or DOI from your publications)'
            widget: list
            required: false
            hint: 'Paste a paper title (or doi:10.xxxx/xxxx) that exists in your publications. Each one shows as a large card.'
            field: { name: paper, label: 'Title or DOI', widget: string }
          - { name: all_heading, label: 'Heading above the full publication list', widget: string }
          - { name: videos_heading, label: 'Heading for the talks/videos section', widget: string }
          - { name: videos_max, label: 'How many videos to show in the row (rest go to a More page)', widget: number, value_type: int, default: 3, min: 1 }
          - name: videos_size
            label: 'Video size'
            widget: select
            default: 480px
            options:
              - { label: 'Small', value: 360px }
              - { label: 'Medium', value: 480px }
              - { label: 'Large', value: 720px }
            hint: 'Width of each video. For a custom width, type any CSS value (e.g. 550px) directly in _data/content/research.yaml.'
          - name: videos
            label: 'Talks & videos (YouTube)'
            widget: list
            required: false
            hint: 'Paste a normal YouTube link (watch?v=... or youtu.be/...). Empty list hides the whole section.'
            fields:
              - { name: title, label: 'Title / caption', widget: string, required: false }
              - { name: url,   label: 'YouTube link', widget: string }

      - name: projects
        label: 'Projects page'
        file: _data/content/projects.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }

      - name: team
        label: 'Team page'
        file: _data/content/team.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }
          - { name: band,  label: 'Mid-page band paragraph', widget: text }
          - { name: photos_max, label: 'How many photos to show in the row (rest go to a More page)', widget: number, value_type: int, default: 6, min: 1 }
          - name: photos_size
            label: 'Photo size'
            widget: select
            default: 180px
            options:
              - { label: 'Small', value: 130px }
              - { label: 'Medium', value: 180px }
              - { label: 'Large', value: 240px }
            hint: 'Thumbnail size. For a custom size, type any CSS value (e.g. 200px) in _data/content/team.yaml.'
          - name: figures
            label: 'Photo wall (add as many as you like)'
            widget: list
            required: false
            field: { name: image, label: Photo, widget: image }

      - name: blog
        label: 'Blog page'
        file: _data/content/blog.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }

      - name: contact
        label: 'Contact page'
        file: _data/content/contact.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }
          - { name: email,           label: Email address, widget: string }
          - { name: phone_text,      label: 'Phone (shown)', widget: string }
          - { name: phone_link,      label: 'Phone (dial link, e.g. +1-555-...)', widget: string }
          - { name: address_tooltip, label: 'Address tooltip', widget: string }
          - { name: address_link,    label: 'Map / address link', widget: string }
          - name: extra_buttons
            label: 'Extra buttons (next to email/phone/address)'
            widget: list
            required: false
            fields:
              - name: type
                label: 'Icon'
                widget: select
                default: website
                options: [website, link, email, phone, address, twitter, github, linkedin, orcid, google-scholar, youtube]
              - { name: text, label: 'Button text', widget: string }
              - { name: link, label: 'Link / value', widget: string }
          - name: figures
            label: 'Photos (add as many as you like)'
            widget: list
            required: false
            fields:
              - { name: image,   label: Photo, widget: image }
              - { name: caption, label: Caption, widget: string, required: false }
          - { name: col1, label: 'Bottom column 1', widget: text }
          - { name: col2, label: 'Bottom column 2', widget: text }
          - { name: col3, label: 'Bottom column 3', widget: text }

  # ====================================================================
  #  PUBLICATIONS -> _data/sources.yaml (wrapped under "list:")
  #  Each item only needs an "id" (DOI / PubMed ID / arXiv / URL); the
  #  title, authors, journal and date are fetched automatically by the
  #  citation builder. Everything else is optional and overrides the
  #  auto-fetched value. All known fields are declared so editing an
  #  entry never strips data it doesn't know about.
  # ====================================================================
  - name: publications
    label: Publications
    files:
      - name: sources
        label: 'Publication list'
        file: _data/sources.yaml
        fields:
          - name: list
            label: 'Publications (add / remove anytime)'
            label_singular: 'Publication'
            widget: list
            required: false
            summary: '{{fields.title | default: fields.id}}'
            hint: 'Click "+ Publication" to add a paper. Usually you only fill in the ID; the rest is fetched automatically.'
            fields:
              - { name: id, label: 'ID (e.g. doi:10.1234/abc, pmid:12345678, arxiv:2001.00001, or a URL)', widget: string, required: false }
              - name: type
                label: 'Type (icon)'
                widget: select
                required: false
                default: paper
                options: [paper, preprint, talk, poster, dataset, software, website, book, chapter, patent, other]
              - { name: image, label: 'Image / thumbnail (optional)', widget: image, required: false }
              - { name: description, label: 'Description (optional; shows on Highlighted cards. Markdown ok)', widget: text, required: false }
              - name: tags
                label: 'Tags (optional)'
                widget: list
                required: false
              - { name: repo, label: 'GitHub repo (owner/name, optional - shows stars)', widget: string, required: false }
              - name: buttons
                label: 'Buttons (optional links under the card)'
                widget: list
                required: false
                fields:
                  - { name: type, label: 'Icon/type (e.g. website, source, manubot, pdf)', widget: string, required: false }
                  - { name: text, label: 'Button text (optional)', widget: string, required: false }
                  - { name: link, label: 'Link', widget: string, required: false }
              - { name: title, label: 'Title (optional - overrides the auto-fetched title)', widget: string, required: false }
              - { name: authors, label: 'Authors (optional - overrides auto-fetched)', widget: list, required: false }
              - { name: publisher, label: 'Journal / publisher (optional - overrides auto-fetched)', widget: string, required: false }
              - { name: date, label: 'Date (YYYY-MM-DD, optional - overrides auto-fetched)', widget: string, required: false }
              - { name: link, label: 'Link (optional - overrides auto-fetched)', widget: string, required: false }
              - { name: remove, label: 'Hide this entry (keeps it here but removes it from the site)', widget: boolean, required: false, default: false }

  # ====================================================================
  #  SITE SETTINGS (lab identity) -> _data/site.yaml
  # ====================================================================
  - name: site
    label: 'Site settings'
    files:
      - name: identity
        label: 'Lab name & links'
        file: _data/site.yaml
        fields:
          - { name: title,       label: 'Lab name', widget: string }
          - { name: subtitle,    label: 'Subtitle (shown under the name)', widget: string, required: false }
          - { name: description, label: 'Description (for search engines / social previews)', widget: text, required: false }
          - { name: header_image, label: 'Top banner image (shown at the top of every page)', widget: image, required: false }
          - { name: footer_image, label: 'Footer background image', widget: image, required: false }
          - { name: page_background, label: 'Whole-page background image (leave blank for plain look)', widget: image, required: false }
          - name: page_panel_opacity
            label: 'How much the background shows through'
            widget: select
            default: 0.85
            options:
              - { label: 'Subtle (image faint)', value: 0.92 }
              - { label: 'Medium', value: 0.85 }
              - { label: 'Strong (image prominent)', value: 0.72 }
          - name: links
            label: 'Social / contact links'
            widget: object
            required: false
            hint: 'Leave a field blank to hide that icon in the footer.'
            fields:
              - { name: email,          label: Email,           widget: string, required: false }
              - { name: orcid,          label: ORCID,           widget: string, required: false }
              - { name: google-scholar, label: 'Google Scholar', widget: string, required: false }
              - { name: github,         label: GitHub,          widget: string, required: false }
              - { name: twitter,        label: 'Twitter / X',   widget: string, required: false }
              - { name: linkedin,       label: LinkedIn,        widget: string, required: false }
              - { name: youtube,        label: YouTube,         widget: string, required: false }

  # ====================================================================
  #  REPEATABLE LISTS - add/remove as many as you like, anytime
  # ====================================================================

  # ---------- Members -> _members/*.md ----------
  - name: members
    label: Members
    label_singular: Member
    folder: _members
    create: true                  # "+ Member" anytime
    slug: '{{fields.name | lower | replace(" ", "-")}}'
    summary: '{{fields.name}} - {{fields.role}}'
    sort:
      - { field: name, direction: ascending }
    fields:
      - { name: name, label: Name, widget: string }
      - { name: image, label: Photo, widget: image, required: false, default: images/photo.jpg }
      - name: role
        label: Role
        widget: select
        hint: The team page groups people by role; ask the admin to add options here if you need a new role
        options:
          - { label: 'PI (Principal Investigator)', value: principal-investigator }
          - { label: 'Co-PI',                       value: co-pi }
          - { label: 'Research Scientist',          value: research-scientist }
          - { label: 'Postdoc',                     value: postdoc }
          - { label: 'PhD Student',                 value: phd }
          - { label: 'Masters Student',             value: masters }
          - { label: 'Undergraduate',               value: undergrad }
          - { label: 'Research Assistant / Programmer', value: programmer }
          - { label: 'Lab Manager',                 value: lab-manager }
          - { label: 'Visiting Scholar',            value: visiting }
          - { label: 'Rotation Student',            value: rotation }
          - { label: 'Alumni (former member)',      value: alumni }
      - { name: affiliation, label: Affiliation, widget: string, required: false }
      - { name: aliases, label: 'Name aliases (for auto-matching paper authors, optional)', widget: list, required: false }
      - name: links
        label: 'Known links (icon shows only if filled)'
        widget: object
        required: false
        fields:
          - { name: email,          label: Email,           widget: string, required: false }
          - { name: home-page,      label: Home page,       widget: string, required: false }
          - { name: orcid,          label: ORCID,           widget: string, required: false }
          - { name: google-scholar, label: 'Google Scholar', widget: string, required: false }
          - { name: github,         label: GitHub,          widget: string, required: false }
          - { name: twitter,        label: 'Twitter / X',   widget: string, required: false }
          - { name: linkedin,       label: LinkedIn,        widget: string, required: false }
      - name: extra_links
        label: 'Other links (custom label + URL)'
        widget: list
        required: false
        hint: 'For anything not in the list above (e.g. CIW, a personal site, a database profile). Shows a globe icon + your label.'
        fields:
          - { name: label, label: 'Label / description', widget: string }
          - { name: link,  label: 'URL', widget: string }
      - { name: body, label: Bio, widget: markdown, required: false }

  # ---------- Projects -> _projects/*.md ----------
  - name: projects
    label: Projects
    label_singular: Project
    folder: _projects
    create: true                  # "+ Project" anytime
    slug: '{{fields.title | lower | replace(" ", "-")}}'
    summary: '{{fields.title}}'
    sort:
      - { field: title, direction: ascending }
    fields:
      - { name: title, label: Title, widget: string }
      - { name: subtitle, label: Subtitle, widget: string, required: false }
      - name: group
        label: Section
        widget: select
        default: more
        hint: '"Featured" shows large in the top row; "More" shows smaller below.'
        options:
          - { label: 'Featured (top row)', value: featured }
          - { label: 'More (smaller, below)', value: more }
      - { name: image, label: Image, widget: image, required: false, default: images/photo.jpg }
      - { name: link, label: 'Link (where the card goes when clicked)', widget: string, required: false }
      - { name: description, label: Description, widget: text, required: false }
      - { name: repo, label: 'GitHub repo (owner/name, optional - shows stars)', widget: string, required: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: body, label: 'Notes (not shown on the card)', widget: markdown, required: false }

  # ---------- Blog posts -> _posts/*.md ----------
  - name: blog-posts
    label: 'Blog posts'
    label_singular: 'Blog post'
    folder: _posts
    create: true                  # "+ Blog post" anytime
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{fields.date}} - {{fields.title}}'
    sort:
      - { field: date, direction: descending }
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date,  label: Date, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false }
      - name: author
        label: Author
        widget: relation
        collection: members
        search_fields: [name]
        value_field: '{{slug}}'
        display_fields: [name]
        required: false
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: body, label: Body, widget: markdown }
