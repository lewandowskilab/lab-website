# =============================================================
#  Sveltia CMS configuration
#  Defines what the visual admin (/admin) can edit and which form
#  fields each section exposes. The CMS only writes fields it knows
#  about, so each section's fields must match the underlying file
#  exactly, or unlisted data would be stripped on save.
# =============================================================

backend:
  name: github
  repo: Yangfan9606/lab-website   # ★set to "username/repo"; update again after transfer to the lab account
  branch: main                    # edits save to main; GitHub Actions builds and publishes to gh-pages
  # base_url: https://YOUR-AUTH-WORKER.workers.dev   # ★OAuth relay (see CMS-Guide.md section 3)

media_folder: images        # uploaded images are stored in the repo's images/ folder
public_folder: images       # path prefix written into files (= the template's existing style)

locale: en

collections:

  # ====================================================================
  #  PAGE CONTENT - one section per page. Each edits its own data file
  #  under _data/content/. The page templates read these via Liquid, so
  #  layout stays locked in the templates and can't be broken here.
  # ====================================================================

  # ---------- Main page -> _data/content/home.yaml ----------
  - name: page-home
    label: 'Main page'
    files:
      - name: home
        label: 'Main page'
        file: _data/content/home.yaml
        fields:
          - { name: title, label: Big title, widget: string }
          - { name: intro, label: Intro paragraph, widget: text }
          - { name: feature1_title,  label: 'Panel 1 - title',  widget: string }
          - { name: feature1_text,   label: 'Panel 1 - text',   widget: text }
          - { name: feature1_button, label: 'Panel 1 - button label', widget: string }
          - { name: feature1_image,  label: 'Panel 1 - image',  widget: image }
          - { name: feature2_title,  label: 'Panel 2 - title',  widget: string }
          - { name: feature2_text,   label: 'Panel 2 - text',   widget: text }
          - { name: feature2_button, label: 'Panel 2 - button label', widget: string }
          - { name: feature2_image,  label: 'Panel 2 - image',  widget: image }
          - { name: feature3_title,  label: 'Panel 3 - title',  widget: string }
          - { name: feature3_text,   label: 'Panel 3 - text',   widget: text }
          - { name: feature3_button, label: 'Panel 3 - button label', widget: string }
          - { name: feature3_image,  label: 'Panel 3 - image',  widget: image }

  # ---------- Research -> _data/content/research.yaml ----------
  - name: page-research
    label: 'Research page'
    files:
      - name: research
        label: 'Research page'
        file: _data/content/research.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }

  # ---------- Projects -> _data/content/projects.yaml ----------
  - name: page-projects
    label: 'Projects page'
    files:
      - name: projects
        label: 'Projects page'
        file: _data/content/projects.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }

  # ---------- Team -> _data/content/team.yaml ----------
  - name: page-team
    label: 'Team page'
    files:
      - name: team
        label: 'Team page'
        file: _data/content/team.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }
          - { name: band,  label: 'Mid-page band paragraph', widget: text }
          - { name: figure1_image, label: 'Photo 1', widget: image }
          - { name: figure2_image, label: 'Photo 2', widget: image }
          - { name: figure3_image, label: 'Photo 3', widget: image }

  # ---------- Blog (page intro) -> _data/content/blog.yaml ----------
  # (Individual posts are the "Blog posts" section further below.)
  - name: page-blog
    label: 'Blog page'
    files:
      - name: blog
        label: 'Blog page'
        file: _data/content/blog.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }

  # ---------- Contact -> _data/content/contact.yaml ----------
  - name: page-contact
    label: 'Contact page'
    files:
      - name: contact
        label: 'Contact page'
        file: _data/content/contact.yaml
        fields:
          - { name: intro, label: Intro paragraph, widget: text }
          - { name: email,           label: Email address, widget: string }
          - { name: phone_text,      label: 'Phone (shown)', widget: string }
          - { name: phone_link,      label: 'Phone (dial link, e.g. +1-555-...)', widget: string }
          - { name: address_tooltip, label: 'Address tooltip', widget: string }
          - { name: address_link,    label: 'Map / address link', widget: string }
          - { name: figure1_image,   label: 'Photo 1', widget: image }
          - { name: figure1_caption, label: 'Photo 1 caption', widget: string, required: false }
          - { name: figure2_image,   label: 'Photo 2', widget: image }
          - { name: figure2_caption, label: 'Photo 2 caption', widget: string, required: false }
          - { name: col1, label: 'Bottom column 1', widget: text }
          - { name: col2, label: 'Bottom column 2', widget: text }
          - { name: col3, label: 'Bottom column 3', widget: text }

  # ====================================================================
  #  SITE-WIDE
  # ====================================================================

  # ---------- Site settings (lab identity) -> _data/site.yaml ----------
  - name: site
    label: 'Site settings'
    files:
      - name: identity
        label: 'Lab name & links'
        file: _data/site.yaml
        fields:
          - { name: title,       label: 'Lab name', widget: string }
          - { name: subtitle,    label: 'Subtitle (shown under the name)', widget: string, required: false }
          - { name: description, label: 'Description (for search engines / social previews)', widget: text, required: false }
          - name: links
            label: 'Social / contact links'
            widget: object
            required: false
            hint: 'Leave a field blank to hide that icon in the footer.'
            fields:
              - { name: email,          label: Email,           widget: string, required: false }
              - { name: orcid,          label: ORCID,           widget: string, required: false }
              - { name: google-scholar, label: 'Google Scholar', widget: string, required: false }
              - { name: github,         label: GitHub,          widget: string, required: false }
              - { name: twitter,        label: 'Twitter / X',   widget: string, required: false }
              - { name: youtube,        label: YouTube,         widget: string, required: false }

  # ====================================================================
  #  REPEATABLE LISTS - add/remove as many as you like, anytime
  # ====================================================================

  # ---------- Members -> _members/*.md ----------
  - name: members
    label: Members
    label_singular: Member
    folder: _members
    create: true                  # "+ Member" anytime
    slug: '{{fields.name | lower | replace(" ", "-")}}'
    summary: '{{fields.name}} - {{fields.role}}'
    sort:
      - { field: name, direction: ascending }
    fields:
      - { name: name, label: Name, widget: string }
      - { name: image, label: Photo, widget: image, required: false, default: images/photo.jpg }
      - name: role
        label: Role
        widget: select
        hint: The team page groups people by role; ask the admin to add options here if you need a new role
        options:
          - { label: 'PI (Principal Investigator)', value: principal-investigator }
          - { label: 'Postdoc',                     value: postdoc }
          - { label: 'PhD Student',                 value: phd }
          - { label: 'Masters Student',             value: masters }
          - { label: 'Undergraduate',               value: undergrad }
          - { label: 'Research Assistant / Programmer', value: programmer }
          - { label: 'Alumni',                      value: alumni }
      - { name: affiliation, label: Affiliation, widget: string, required: false }
      - { name: aliases, label: 'Name aliases (for auto-matching paper authors, optional)', widget: list, required: false }
      - name: links
        label: Links
        widget: object
        required: false
        fields:
          - { name: email,          label: Email,           widget: string, required: false }
          - { name: home-page,      label: Home page,       widget: string, required: false }
          - { name: orcid,          label: ORCID,           widget: string, required: false }
          - { name: google-scholar, label: 'Google Scholar', widget: string, required: false }
          - { name: github,         label: GitHub,          widget: string, required: false }
          - { name: twitter,        label: 'Twitter / X',   widget: string, required: false }
      - { name: body, label: Bio, widget: markdown, required: false }

  # ---------- Blog posts -> _posts/*.md ----------
  - name: blog-posts
    label: 'Blog posts'
    label_singular: 'Blog post'
    folder: _posts
    create: true                  # "+ Blog post" anytime
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{fields.date}} - {{fields.title}}'
    sort:
      - { field: date, direction: descending }
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date,  label: Date, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false }
      - name: author
        label: Author
        widget: relation
        collection: members
        search_fields: [name]
        value_field: '{{slug}}'
        display_fields: [name]
        required: false
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: body, label: Body, widget: markdown }
